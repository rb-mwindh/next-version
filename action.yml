name: 'Next Version'
description: 'Compute next semantic version using semantic-release dry-run'
author: 'Markus Windhager'

branding:
  icon: 'tag'
  color: 'blue'

inputs:
  branches:
    description: 'Branch rule specs (one per line). Format: "<name>[;key[=value]]..." e.g. "main", "develop;prerelease=dev;channel=develop"'
    required: true
  tagFormat:
    description: 'Git tag format (default: "v${version}")'
    required: false
  preset:
    description: 'Conventional changelog preset (default: "angular"). Supported: angular, atom, codemirror, conventionalcommits, ember, eslint, express, jquery, jshint.'
    required: false
    default: 'angular'
  createTag:
    description: 'Whether to create a git tag for the computed version (default: false). If false, the action will only compute the next version without creating a git tag.'
    required: false
    default: 'false'
  relnotesArtifact:
    description: 'If set, upload the release notes file as an artifact with this name.'
    required: false

outputs:
  version:
    description: 'The computed next version (e.g. 1.2.3 or 1.2.3-dev.4)'
  channel:
    description: 'Release channel (e.g. latest, develop, beta)'
  type:
    description: 'Release type (major, minor, patch)'
  gitTag:
    description: 'The git tag for this release'
  gitHead:
    description: 'The git commit SHA'
  name:
    description: 'Release name'
  relnotesPath:
    description: 'Path to the file containing the generated release notes. This can be controlled via the RELEASE_NOTES environment variable (see documentation).'
  notes:
    description: 'The generated release notes as a string (if available).'

runs:
  using: 'node20'
  main: 'bin/action.cjs'
